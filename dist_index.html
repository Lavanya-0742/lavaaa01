  <html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Candle Surprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- THE CANDLE SECTION -->
        <div id="candle-div">
            <div class="candle">
                <div id="flame-group" class="flame-wrapper">
                    <div class="flame-main"></div>
                </div>
                <div class="wick"></div>
            </div>
        </div>

        <!-- THE BIRTHDAY SECTION -->
        <div id="birthday-message">
            <!-- Ensure your image is in the same folder and named photo.jpg -->
            <img id="bday-photo" src="lavaaaaaa05.jpeg" alt="Happy Birthday Photo">
            <h1>✨ Happy Birthday! ✨</h1>
            <p>Make a wish come true.</p>
        </div>

        <p id="status">Ready to celebrate?</p>
        <button id="startBtn">LIGHT THE CANDLE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
